# Dagster instance config — uses existing data_engine RDS for storage.
# Single unified storage block (run/event/schedule all share one Postgres).

storage:
  postgres:
    postgres_db:
      hostname:
        env: DAGSTER_PG_HOST
      username:
        env: DAGSTER_PG_USER
      password:
        env: DAGSTER_PG_PASSWORD
      db_name:
        env: DAGSTER_PG_DB
      port:
        env: DAGSTER_PG_PORT

run_coordinator:
  module: dagster.core.run_coordinator
  class: QueuedRunCoordinator
  config:
    max_concurrent_runs: 4

run_launcher:
  module: dagster.core.launcher
  class: DefaultRunLauncher

# Auto-prune run history after 90 days
retention:
  schedule:
    purge_after_days: 90
  sensor:
    purge_after_days: 90
