services:
  data-engine:
    build: .
    ports:
      - "8010:8010"
    env_file:
      - .env
    volumes:
      - ./app:/app/app
      - ./scripts:/app/scripts
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      redis:
        condition: service_started

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme} --maxmemory 2gb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redis-data:/data
    restart: unless-stopped

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "8099:8099"
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      data-engine:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    restart: unless-stopped

  dagster-webserver:
    build:
      context: .
      dockerfile: dagster_app/Dockerfile
    ports:
      - "3030:3030"
    env_file:
      - .env
    environment:
      DAGSTER_HOME: /opt/dagster/dagster_home
      DATA_ENGINE_BASE_URL: http://data-engine:8010
    volumes:
      - ./dagster_app:/opt/dagster/dagster_app
    restart: unless-stopped
    depends_on:
      data-engine:
        condition: service_healthy
    command: ["dagster-webserver", "-h", "0.0.0.0", "-p", "3030", "-w", "/opt/dagster/workspace.yaml", "--path-prefix", "/dagster"]

  dagster-daemon:
    build:
      context: .
      dockerfile: dagster_app/Dockerfile
    env_file:
      - .env
    environment:
      DAGSTER_HOME: /opt/dagster/dagster_home
      DATA_ENGINE_BASE_URL: http://data-engine:8010
    volumes:
      - ./dagster_app:/opt/dagster/dagster_app
    restart: unless-stopped
    depends_on:
      data-engine:
        condition: service_healthy
    command: ["dagster-daemon", "run", "-w", "/opt/dagster/workspace.yaml"]

volumes:
  redis-data:
  prometheus-data:
