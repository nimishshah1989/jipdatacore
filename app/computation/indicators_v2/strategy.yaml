# Technical indicator catalog for the indicators v2 engine.
# Each entry describes one pandas-ta-classic indicator to compute.
#
# Fields:
#   name:           human-readable label
#   kind:           pandas-ta-classic function name (e.g. "sma", "ema")
#   params:         kwargs passed to the pandas-ta-classic function
#   output_columns: map of pandas-ta emitted column name -> schema column name (Fix 3)
#                   Keys verified against pandas-ta-classic==0.4.47 output exactly.
#   applies_to:     list of asset classes this indicator runs on
#   requires_volume: bool — skipped for assets where AssetSpec.volume_col is None
#
# Supported asset classes: equity, etf, index, mf, global
#
# Column name verification (IND-C3a, 2026-04-14):
#   docker run jip-data-engine:ind-c2 python -c "import pandas_ta_classic as ta; ..."
#   Confirmed: SMA_5, SMA_10, SMA_20, SMA_50, SMA_100, SMA_200
#             EMA_5, EMA_10, EMA_20, EMA_50, EMA_100, EMA_200
#
# IND-C3b will extend this file with the full ~130-indicator catalog.

indicators:
  - name: SMA(5)
    kind: sma
    params: { length: 5 }
    output_columns: { "SMA_5": "sma_5" }
    applies_to: [equity, etf, index, mf, global]
    requires_volume: false

  - name: SMA(10)
